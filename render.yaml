services:
  - type: web
    name: series-ranks
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/prefetch_imdb.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: IMDB_DATA_DIR
        value: /opt/render/project/src/data/imdb
      - key: TMDB_API_KEY
        sync: false
